<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>镜像服务原型 V1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      :root {
        --smf-primary: #4c5df7;
        --smf-primary-soft: #eef0ff;
        --smf-page-bg: #f5f7fb;
        --smf-card-bg: #ffffff;
        --smf-border: #e5e7eb;
        --smf-border-soft: #eef1f5;
        --smf-text: #1f2328;
        --smf-text-secondary: #667085;
        --smf-text-tertiary: #98a2b3;
        --smf-success: #12b76a;
        --smf-warning: #f79009;
        --smf-danger: #f04438;
        --smf-info: #475467;
        --smf-shadow-s1: 0 1px 2px rgba(16, 24, 40, 0.05);
        --smf-shadow-s2: 0 4px 12px rgba(16, 24, 40, 0.08);
        --smf-shadow-s4: 0 12px 32px rgba(16, 24, 40, 0.14);
        --z-topbar: 200;
        --z-sticky: 300;
        --el-color-primary: #4c5df7;
        --el-color-primary-light-9: #eef0ff;
        --el-bg-color: #ffffff;
        --el-bg-color-page: #f5f7fb;
        --el-border-color: #e5e7eb;
        --el-border-color-light: #eef1f5;
        --el-text-color-primary: #1f2328;
        --el-text-color-regular: #475467;
        --el-text-color-secondary: #667085;
        --el-fill-color-light: #f8f9fc;
        --el-border-radius-base: 8px;
      }

      [v-cloak] {
        display: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
        background: var(--smf-page-bg);
        color: var(--smf-text);
        -webkit-font-smoothing: antialiased;
      }

      button:focus-visible,
      [role="button"]:focus-visible,
      a:focus-visible,
      .el-input__wrapper:focus-within,
      .el-select__wrapper:focus-within,
      .el-textarea__inner:focus-visible {
        outline: 2px solid var(--smf-primary);
        outline-offset: 4px;
      }

      .fallback-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        background: linear-gradient(180deg, #f6f7ff 0%, #f5f7fb 100%);
      }

      .fallback-card {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 20px;
        background: #ffffff;
        border: 1px solid var(--smf-border);
        box-shadow: var(--smf-shadow-s4);
      }


      .smf-shell-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        display: flex;
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid #ebeef5;
        z-index: var(--z-topbar);
      }

      .smf-logo-block {
        height: 52px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .smf-logo-mark {
        width: 28px;
        height: 28px;
        border-radius: 9px;
        background: linear-gradient(145deg, #4c5df7, #7388ff);
        position: relative;
      }

      .smf-logo-mark::before,
      .smf-logo-mark::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 999px;
      }

      .smf-logo-mark::before {
        width: 16px;
        height: 2px;
        left: 6px;
        top: 9px;
      }

      .smf-logo-mark::after {
        width: 10px;
        height: 2px;
        left: 9px;
        top: 16px;
      }

      .smf-logo-text {
        font-size: 16px;
        font-weight: 700;
        color: #303133;
      }

      .smf-top-nav {
        height: 52px;
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .smf-top-nav-btn {
        height: 52px;
        padding: 0;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        color: #606266;
        font-size: 14px;
        cursor: pointer;
      }

      .smf-top-nav-btn.active {
        color: var(--smf-primary);
        font-weight: 600;
        border-bottom-color: var(--smf-primary);
      }

      .smf-header-right {
        margin-left: auto;
        height: 52px;
        padding-right: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .smf-head-link,
      .smf-region-trigger {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #303133;
        font-size: 13px;
        text-decoration: none;
      }

      .smf-region-trigger {
        cursor: pointer;
      }

      .smf-avatar {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: #dbeafe;
        color: #2563eb;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
      }

      .smf-version {
        font-size: 11px;
        color: var(--smf-text-tertiary);
      }

      .smf-shell-body {
        margin-top: 52px;
        display: flex;
        height: calc(100vh - 52px);
      }

      .smf-shell-side {
        width: 200px;
        flex-shrink: 0;
        background: #ffffff;
        border-right: 1px solid #ebeef5;
        overflow-y: auto;
        padding: 12px 0;
      }

      .smf-side-group {
        margin-bottom: 8px;
      }

      .smf-side-title {
        margin: 0;
        padding: 12px 0 8px 20px;
        font-size: 12px;
        color: #909399;
        font-weight: 600;
      }

      .smf-side-item {
        width: 100%;
        height: 40px;
        padding: 0 14px 0 20px;
        border: 0;
        background: transparent;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #303133;
        cursor: pointer;
        position: relative;
        font-size: 14px;
        text-align: left;
      }

      .smf-side-item.active {
        background: #eef0ff;
        color: var(--smf-primary);
      }

      .smf-side-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        background: var(--smf-primary);
      }

      .smf-side-icon {
        width: 16px;
        height: 16px;
      }

      .smf-shell-main {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 20px 28px;
      }

      .smf-card {
        background: var(--smf-card-bg);
        border: 1px solid var(--smf-border-soft);
        border-radius: 12px;
        box-shadow: var(--smf-shadow-s1);
      }


      .smf-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: nowrap;
      }

      .mb-4 {
        margin-bottom: 16px;
      }

      .justify-end {
        justify-content: flex-end;
      }

      .smf-tab-box {
        padding: 0 18px;
      }

      .smf-tab-box .el-tabs__header {
        margin: 0;
      }

      .smf-tab-box .el-tabs__nav-wrap::after {
        background: transparent;
      }

      .smf-tab-box .el-tabs__item {
        height: 56px;
        font-size: 14px;
        color: var(--smf-text-secondary);
      }

      .smf-tab-box .el-tabs__item.is-active {
        color: var(--smf-primary);
        font-weight: 600;
      }

      .smf-tab-label {
        display: inline-flex;
        align-items: center;
      }

      .smf-tab-badge {
        display: none;
      }

      .smf-section {
        margin-top: 16px;
      }

      .smf-project-rail {
        padding: 0;
      }

      .smf-rail-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .smf-rail-head-main {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .smf-rail-title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }

      .smf-rail-hint {
        margin: 4px 0 0;
        color: var(--smf-text-secondary);
        font-size: 13px;
      }

      .smf-project-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .smf-project-name {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--smf-text);
      }

      .smf-project-sub {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 10px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-project-kpi {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .smf-project-workspace {
        display: grid;
        grid-template-columns: 272px minmax(0, 1fr);
        gap: 18px;
      }

      .smf-project-sidebar-panel {
        padding: 16px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: #ffffff;
        align-self: start;
        position: sticky;
        top: 0;
      }

      .smf-project-search {
        margin-bottom: 12px;
      }

      .smf-project-toolbar {
        display: block;
        margin-bottom: 14px;
      }

      .smf-project-toolbar .el-button {
        width: 100%;
      }

      .smf-project-count {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef4ff;
        color: #3551d8;
        font-size: 12px;
        font-weight: 600;
      }

      .smf-project-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: min(620px, calc(100vh - 248px));
        overflow-y: auto;
        padding-right: 4px;
      }

      .smf-project-list-item {
        width: 100%;
        border: 1px solid #dbe4f1;
        border-radius: 16px;
        background: #ffffff;
        padding: 12px;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      }

      .smf-project-list-item:hover {
        border-color: #b8c8ef;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
      }

      .smf-project-list-item.active {
        border-color: rgba(76, 93, 247, 0.38);
        background: linear-gradient(180deg, #fbfcff 0%, #f2f6ff 100%);
        box-shadow: 0 0 0 3px rgba(76, 93, 247, 0.08);
      }

      .smf-project-list-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .smf-project-list-side {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex: none;
      }

      .smf-project-list-foot {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .smf-project-list-id {
        margin-top: 6px;
        font-size: 12px;
        color: var(--smf-text-secondary);
        line-height: 1.4;
      }

      .smf-project-state {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-project-state-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #4c5df7;
        flex: none;
      }

      .smf-project-usage {
        margin-top: 12px;
      }

      .smf-project-usage-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-project-usage-value {
        font-weight: 600;
        color: var(--smf-text);
      }


      .smf-project-list-meta {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .smf-project-meta-block {
        min-width: 0;
      }

      .smf-project-meta-label {
        font-size: 11px;
        color: var(--smf-text-tertiary);
      }

      .smf-project-meta-value {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--smf-text);
        word-break: break-word;
      }

      .smf-project-stage {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 0;
      }

      .smf-selected-project {
        padding: 16px;
        border: 1px solid #dbe4f1;
        background: #ffffff;
      }

      .smf-selected-project-detail {
        padding-top: 8px;
      }

      .smf-selected-project-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .smf-selected-project-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: nowrap;
      }

      .smf-selected-project-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 12px;
      }

      .smf-project-hero {
        padding: 0;
        background: transparent;
      }

      .smf-project-hero-title {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--smf-text);
      }

      .smf-project-hero-desc {
        margin: 8px 0 0;
        font-size: 13px;
        line-height: 1.6;
        color: var(--smf-text-secondary);
      }

      .smf-project-overview-meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-project-meta-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(148, 163, 184, 0.16);
        color: #475569;
      }

      .smf-project-overview-shell {
        margin-top: 8px;
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) 144px; grid-template-areas: "main stats";
        gap: 8px;
        align-items: stretch;
      }

      .smf-project-panel {
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid #e5ecf5;
        background: linear-gradient(180deg, #fbfcff 0%, #ffffff 100%);
        display: flex;
        flex-direction: column;
        min-width: 0;
        height: 100%;
      }

      .smf-project-overview-stats {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 8px;
        width: 144px;
        justify-self: end;
      }

      .smf-project-panel-value-row {
        margin-top: 6px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .smf-project-usage-inline {
        font-size: 12px;
        font-weight: 700;
        color: var(--smf-text-secondary);
        white-space: nowrap;
      }

      .smf-project-panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .smf-project-usage-corner {
        font-size: 12px;
        font-weight: 700;
        color: var(--smf-text);
        white-space: nowrap;
      }

      .smf-project-mini-stat {
        padding: 10px 12px;
      }

      .smf-project-mini-stat-value {
        margin-top: 6px;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.1;
      }

      .smf-project-usage-track {
        position: relative;
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        background: #e7edf6;
        overflow: hidden;
      }

      .smf-project-usage-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
        background: linear-gradient(90deg, #4c5df7 0%, #7e8bff 100%);
      }

      .smf-project-panel-label {
        font-size: 11px;
        color: var(--smf-text-tertiary);
      }

      .smf-project-panel-value {
        margin-top: 4px;
        font-size: 20px;
        font-weight: 700;
        color: var(--smf-text);
      }

      .smf-project-panel-sub {
        margin-top: 6px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-project-metric-row {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .smf-project-mini-stat {
        padding: 8px 10px;
        border-radius: 12px;
        background: #ffffff;
        border: 1px solid #edf2f7;
        min-width: 0;
      }

      .smf-project-mini-stat-value {
        margin-top: 4px;
        font-size: 15px;
        font-weight: 700;
        color: var(--smf-text);
      }

      .smf-project-mini-stat-sub {
        margin-top: 2px;
        font-size: 11px;
        color: var(--smf-text-secondary);
      }

      .smf-project-latest-name {
        margin-top: 6px;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--smf-text);
        word-break: break-word;
      }

      .smf-project-latest-desc {
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.45;
        color: var(--smf-text-secondary);
      }

      .smf-project-latest-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .smf-project-latest-stat {
        padding: 10px 12px;
        border-radius: 12px;
        background: #ffffff;
        border: 1px solid #edf2f7;
      }

      .smf-project-latest-stat-value {
        margin-top: 5px;
        font-size: 14px;
        font-weight: 700;
        color: var(--smf-text);
        line-height: 1.35;
        word-break: break-word;
      }

      .smf-project-latest-meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-project-latest-tags {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .smf-project-latest-actions {
        margin-top: auto;
        padding-top: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .smf-mini-kpi,
      .smf-summary-card,
      .smf-overview-card {
        padding: 12px 14px;
        border-radius: 14px;
        background: #f8f9fc;
      }

      .smf-mini-kpi-label,
      .smf-summary-title,
      .smf-overview-label {
        font-size: 11px;
        color: var(--smf-text-tertiary);
      }

      .smf-mini-kpi-value,
      .smf-overview-value {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 600;
        color: var(--smf-text);
      }

      .smf-summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .smf-summary-card {
        border: 1px solid var(--smf-border);
        background: linear-gradient(180deg, #ffffff 0%, #f9faff 100%);
      }

      .smf-summary-value {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 700;
        color: var(--smf-text);
      }

      .smf-summary-meta {
        margin-top: 6px;
        font-size: 12px;
        color: var(--smf-text-secondary);
      }

      .smf-filter-box {
        margin-top: 16px;
        padding: 0;
      }

      .smf-filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .smf-filter-main-row {
        flex-wrap: nowrap;
      }

      .smf-filter-item {
        display: flex;
        align-items: center;
        border: 1px solid var(--smf-border);
        border-radius: 8px;
        background: transparent;
        min-width: 0;
      }

      .smf-filter-item:focus-within {
        border-color: var(--smf-primary);
        box-shadow: 0 0 0 2px rgba(76, 93, 247, 0.08);
      }

      .smf-filter-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 32px;
        padding: 0 12px;
        background: #f6f8fb;
        border-right: 1px solid var(--smf-border);
        border-radius: 8px 0 0 8px;
        color: var(--smf-text-secondary);
        font-size: 13px;
        white-space: nowrap;
      }

      .smf-filter-control {
        min-width: 120px;
      }

      .smf-filter-control .el-input__wrapper,
      .smf-filter-control .el-select__wrapper,
      .smf-filter-control .el-date-editor.el-input__wrapper {
        min-height: 32px;
        border-radius: 0 8px 8px 0;
        box-shadow: none;
      }

      .smf-filter-control .el-input__wrapper,
      .smf-filter-control .el-select__wrapper,
      .smf-filter-control .el-date-editor {
        padding-left: 10px;
        padding-right: 10px;
      }

      .smf-filter-actions {

                  <el-dropdown trigger="click" @command="headerRegion = $event">
                    <span class="smf-region-trigger" role="button"><el-icon><Location></Location></el-icon>{{ regionOptions.find((item) => item.value === headerRegion)?.label || regionOptions[0].label }}</span>
                    <template #dropdown>
                      <el-dropdown-menu>
                        <el-dropdown-item v-for="option in regionOptions" :key="option.value" :command="option.value">{{ option.label }}</el-dropdown-item>
                      </el-dropdown-menu>
                    </template>
                  </el-dropdown>
                  <a href="javascript:void(0)" class="smf-head-link"><el-icon><Document></Document></el-icon>{{ t.docsCenter }}</a>
                  <el-dropdown trigger="click" @command="lang = $event">
                    <span class="smf-head-link" role="button"><el-icon><Globe></Globe></el-icon>{{ t.language }}</span>
                    <template #dropdown>
                      <el-dropdown-menu>
                        <el-dropdown-item command="zh">中文简体</el-dropdown-item>
                        <el-dropdown-item command="en">English</el-dropdown-item>
                      </el-dropdown-menu>
                    </template>
                  </el-dropdown>
                  <span class="smf-avatar">IC</span>
                  <span class="smf-version">{{ version }}</span>
                </div>
              </header>

              <div class="smf-shell-body">
                <aside class="smf-shell-side" aria-label="side-menu">
                  <section v-for="group in sideGroups" :key="group.title" class="smf-side-group">
                    <h3 class="smf-side-title">{{ group.title }}</h3>
                    <button v-for="item in group.items" :key="item.key" type="button" class="smf-side-item" :class="{ active: sideActive === item.key }" @click="sideActive = item.key">
                      <el-icon class="smf-side-icon"><component :is="item.icon"></component></el-icon>
                      <span>{{ item.label }}</span>
                    </button>
                  </section>
                </aside>

                <main class="smf-shell-main">
                  <section class="smf-card smf-tab-box">
                    <el-tabs :model-value="activeTab" @tab-change="activeTab = $event">
                      <el-tab-pane v-for="tab in tabList" :key="tab.key" :name="tab.key">
                        <template #label><span>{{ tab.label }}</span><span class="smf-tab-badge">{{ tab.count }}</span></template>
                      </el-tab-pane>
                    </el-tabs>
                  </section>

                  <section v-if="activeTab === 'my'" class="smf-project-rail smf-section">
                    <div class="smf-project-workspace">
                      <aside class="smf-card smf-project-sidebar-panel">
                        <div class="smf-rail-head">
                          <div class="smf-rail-head-main">
                            <div class="smf-project-count">{{ t.projectCount }} · {{ myProjects.length }}</div>
                          </div>
                        </div>
                        <div class="smf-project-search">
                          <el-input v-model="projectKeyword" :placeholder="t.projectSearchPlaceholder" clearable></el-input>
                        </div>
                        <div class="smf-project-toolbar">
                          <el-button type="primary" @click="handleHeaderAction('newProject')">{{ t.newProject }}</el-button>
                        </div>
                        <div v-if="visibleProjects.length" class="smf-project-list">
                          <button v-for="project in visibleProjects" :key="project.id" type="button" class="smf-project-list-item" :class="{ active: activeProject && activeProject.id === project.id }" @click="selectedProjectId = project.id">
                            <div class="smf-project-list-head">
                              <div class="min-w-0">
                                <h3 class="smf-project-name">{{ project.name }}</h3>
                                
                              </div>
                            </div>
                            <div class="smf-project-list-foot">
                              <div class="smf-project-state"><i class="smf-project-state-dot"></i>{{ project.imageCount }} {{ t.imageCount }}</div>
                              <div class="smf-project-state">{{ t.usagePercent }} · {{ quotaPercent(project.quotaUsed, project.quotaTotal) }}%</div>
                            </div>
                          </button>
                        </div>
                        <div v-else class="py-8">
                          <el-empty :description="t.projectEmptySearch"></el-empty>
                        </div>
                      </aside>

                      <div class="smf-project-stage">
                        <template v-if="activeProject">
                          <section class="smf-card smf-selected-project smf-selected-project-detail">
                            <div class="smf-project-hero">
                              <div class="smf-selected-project-head">
                                <div class="min-w-0">
                                  <h2 class="smf-project-hero-title">{{ activeProject.name }}</h2>
                                  <p v-if="activeProject.description" class="smf-project-hero-desc">{{ activeProject.description }}</p>
                                  <div class="smf-project-overview-meta">
                                    <span class="smf-project-meta-chip">{{ t.projectRegion }}：{{ activeProject.region || "华东-上海一" }}</span>
                                    <span class="smf-project-meta-chip">{{ t.projectOwner }}：{{ activeProject.createdBy || "当前用户" }}</span>
                                    <span class="smf-project-meta-chip">{{ t.createdAt }}：{{ activeProject.createdAt }}</span>
                                    <span class="smf-project-meta-chip">{{ t.updatedAt }}：{{ activeProject.updatedAt }}</span>
                                  </div>
                                </div>
                                <div class="smf-selected-project-actions">
                                  <el-button type="danger" plain @click="confirmDeleteProject().catch(() => {})">{{ t.deleteProject }}</el-button>
                                  <el-button type="primary" @click="handleHeaderAction('upload')">{{ t.uploadImage }}</el-button>
                                </div>
                              </div>
                              <div class="smf-project-overview-shell">
                                <article class="smf-project-panel">
                                  <div class="smf-project-panel-head">
                                    <div class="smf-project-panel-label">{{ t.quotaUsed }}</div>
                                    
                                  </div>
                                  <div class="smf-project-panel-value-row"><div class="smf-project-panel-value">{{ summarizeQuota(activeProject.quotaUsed, activeProject.quotaTotal) }}</div><div class="smf-project-usage-inline">{{ t.usagePercent }} · {{ quotaPercent(activeProject.quotaUsed, activeProject.quotaTotal) }}%</div></div>
                                  <div class="smf-project-usage-track">
                                    <div class="smf-project-usage-fill" :style="{ width: quotaPercent(activeProject.quotaUsed, activeProject.quotaTotal) + '%' }"></div>
                                  </div>
                                </article>
                                <div class="smf-project-overview-stats">
                                  <div class="smf-project-mini-stat">
                                    <div class="smf-project-panel-label">{{ t.imageCount }}</div>
                                    <div class="smf-project-mini-stat-value">{{ activeProject.imageCount }}</div>
                                    
                                  </div>
                                  <div class="smf-project-mini-stat">
                                    <div class="smf-project-panel-label">{{ t.versionCount }}</div>
                                    <div class="smf-project-mini-stat-value">{{ projectVersionCount(activeProject) }}</div>
                                    
                                  </div>
                                </div>
                              </div>
                            </div>
                          </section>
                          <section v-if="loading" class="smf-card smf-table-wrap">
                            <div class="smf-skeleton-card"><el-skeleton :rows="6" animated></el-skeleton></div>
                          </section>
                          <section v-else-if="loadError" class="smf-card smf-table-wrap">
                            <el-result icon="error" :title="t.errorTitle" :sub-title="t.errorDesc"><template #extra><el-button type="primary" @click="retryLoad">{{ t.retryLoad }}</el-button></template></el-result>
                          </section>
                          <section v-else class="smf-card smf-table-wrap">
                            <div class="smf-table-head">
                              <div><div class="smf-table-title">{{ t.tableTitleMy }}</div></div>
                              <div class="smf-muted text-[12px]">{{ t.total }} {{ filteredRows.length }} {{ t.items }}</div>
                            </div>

                            <template v-if="filteredRows.length">
                              <el-table :data="pagedRows" class="smf-table" row-key="id" height="520">
                                <el-table-column :label="t.colName" min-width="196" show-overflow-tooltip><template #default="{ row }"><div class="smf-name-cell"><span class="smf-name-main">{{ row.name }}</span><span class="smf-name-sub">{{ t.colUpdatedAt }} · {{ row.updatedAt }}</span></div></template></el-table-column>
                                <el-table-column :label="t.colScene" min-width="220"><template #default="{ row }"><div v-if="buildSceneSummary(row.tags).visible.length" class="smf-tag-group"><span class="smf-scene-token">{{ buildSceneSummary(row.tags).visible[0] }}</span><el-popover v-if="buildSceneSummary(row.tags).overflow.length" placement="top" trigger="hover" :width="220"><template #reference><button type="button" class="smf-tag-overflow-trigger" :aria-label="t.moreScenes">+{{ buildSceneSummary(row.tags).overflow.length }}</button></template><div class="smf-tag-popover"><div v-for="tag in row.tags || []" :key="tag" class="smf-tag-popover-item"><span class="smf-scene-token">{{ tag }}</span></div></div></el-popover></div><span v-else>-</span></template></el-table-column>
                                <el-table-column prop="latestVersion" :label="t.colLatestVersion" min-width="92"></el-table-column>
                                <el-table-column :label="t.versionCount" min-width="76"><template #default="{ row }">{{ imageVersionCount(row) }}</template></el-table-column>
                                <el-table-column prop="updatedAt" :label="t.colUpdatedAt" min-width="136"></el-table-column>
                                <el-table-column :label="t.colAction" fixed="right" width="92">
                                  <template #default="{ row }">
                                    <div class="smf-actions">
                                      <el-button link type="primary" @click="openDetail('my', row)">{{ t.detail }}</el-button>
                                      <el-dropdown trigger="click" @command="handlePushCommand($event, row)">
                                        <el-button link>{{ t.more }}</el-button>
                                        <template #dropdown>
                                          <el-dropdown-menu>
                                            <el-dropdown-item command="editTags">{{ t.editTags }}</el-dropdown-item>
                                            <el-dropdown-item command="delete">{{ t.delete }}</el-dropdown-item>
                                          </el-dropdown-menu>
                                        </template>
                                      </el-dropdown>
                                    </div>
                                  </template>
                                </el-table-column>
                              </el-table>
                            </template>

                            <div v-else class="py-8">
                              <el-empty :description="t.projectEmptyTitle"></el-empty>
                              <p v-if="!currentRows.length" class="m-0 text-center text-[12px] text-[#667085]">{{ t.projectEmptyHint }}</p>
                            </div>

                            <div class="smf-pager" v-if="filteredRows.length"><el-pagination :current-page="query.pageIndex" :page-size="query.pageSize" :page-sizes="[10, 20, 30, 50, 100]" :total="filteredRows.length" layout="total, sizes, prev, pager, next, jumper" background @size-change="handlePageSizeChange" @current-change="handlePageChange"></el-pagination></div>
                          </section>
                        </template>
                        <section v-else class="smf-card smf-selected-project">
                          <el-empty :description="t.projectEmptySearch"></el-empty>
                        </section>
                      </div>
                    </div>
                  </section>

                  <section v-if="activeTab === 'push'" class="smf-section">
                    <div class="smf-summary-grid">
                      <article v-for="card in pushSummary" :key="card.key" class="smf-card smf-summary-card"><div class="smf-summary-title">{{ card.title }}</div><div class="smf-summary-value">{{ card.value }}</div></article>
                    </div>
                  </section>

                  <filter-box v-if="activeTab !== 'my'" :schema="filterSchema" :model="query" :texts="{ search: t.search, reset: t.reset, expand: t.expand, collapse: t.collapse }" :show-expand="true" :default-visible-count="activeTab === 'push' ? 4 : 3" :hide-operation="false" :auto-search-non-input="true" :storage-key="'image-service-filter-' + activeTab" @search="handleSearch" @reset="handleReset"></filter-box>

                  <section v-if="activeTab !== 'my' && loading" class="smf-card smf-table-wrap"><div class="smf-skeleton-card"><el-skeleton :rows="6" animated></el-skeleton></div></section>
                  <section v-else-if="activeTab !== 'my' && loadError" class="smf-card smf-table-wrap"><el-result icon="error" :title="t.errorTitle" :sub-title="t.errorDesc"><template #extra><el-button type="primary" @click="retryLoad">{{ t.retryLoad }}</el-button></template></el-result></section>

                  <section v-else-if="activeTab !== 'my'" class="smf-card smf-table-wrap">
                    <div class="smf-table-head">
                      <div><div class="smf-table-title">{{ activeTab === 'my' ? t.tableTitleMy : activeTab === 'public' ? t.tableTitlePublic : t.tableTitlePush }}</div><div v-if="activeTab === 'my' ? t.tableNoteMy : activeTab === 'public' ? t.tableNotePublic : t.tableNotePush" class="smf-table-note">{{ activeTab === 'my' ? t.tableNoteMy : activeTab === 'public' ? t.tableNotePublic : t.tableNotePush }}</div></div>
                      <div class="smf-muted text-[12px]">{{ t.total }} {{ filteredRows.length }} {{ t.items }}</div>
                    </div>

                    <template v-if="filteredRows.length">
                      <el-table v-if="activeTab === 'public'" :data="pagedRows" class="smf-table" row-key="id" height="460">
                        <el-table-column :label="t.colName" min-width="196" show-overflow-tooltip><template #default="{ row }"><div class="smf-name-cell"><span class="smf-name-main">{{ row.name }}</span><span class="smf-name-sub">{{ t.colUpdatedAt }} · {{ row.updatedAt }}</span></div></template></el-table-column>
                        <el-table-column :label="t.colScene" min-width="220"><template #default="{ row }"><div v-if="buildSceneSummary(row.tags).visible.length" class="smf-tag-group"><span class="smf-scene-token">{{ buildSceneSummary(row.tags).visible[0] }}</span><el-popover v-if="buildSceneSummary(row.tags).overflow.length" placement="top" trigger="hover" :width="220"><template #reference><button type="button" class="smf-tag-overflow-trigger" :aria-label="t.moreScenes">+{{ buildSceneSummary(row.tags).overflow.length }}</button></template><div class="smf-tag-popover"><div v-for="tag in row.tags || []" :key="tag" class="smf-tag-popover-item"><span class="smf-scene-token">{{ tag }}</span></div></div></el-popover></div><span v-else>-</span></template></el-table-column>
                        <el-table-column :label="t.colLatestVersion" min-width="92"><template #default="{ row }">{{ row.versions[0]?.version || '-' }}</template></el-table-column>
                        <el-table-column :label="t.versionCount" min-width="76"><template #default="{ row }">{{ row.versions ? row.versions.length : 0 }}</template></el-table-column>
                        <el-table-column prop="updatedAt" :label="t.colUpdatedAt" min-width="136"></el-table-column>
                        <el-table-column :label="t.colAction" fixed="right" width="110"><template #default="{ row }"><el-button link type="primary" @click="openDetail('public', row)">{{ t.detail }}</el-button></template></el-table-column>
                      </el-table>

                      <el-table v-else :data="pagedRows" class="smf-table" row-key="id" height="460">
                        <el-table-column :label="t.colName" min-width="220"><template #default="{ row }"><div class="smf-name-cell"><span class="smf-name-main">{{ row.imageName }}</span><span class="smf-name-sub">{{ row.version }} · {{ row.project }}</span></div></template></el-table-column>
                        <el-table-column prop="taskName" :label="t.colTaskName" min-width="160" show-overflow-tooltip></el-table-column>
                        <el-table-column :label="t.colTaskType" min-width="120"><template #default="{ row }">{{ taskTypeLabel(row.taskType) }}</template></el-table-column>
                        <el-table-column :label="t.colStatus" min-width="140"><template #default="{ row }"><span :class="statusClass(row.status)"><i class="smf-status-dot"></i>{{ statusLabel(row.status) }}</span></template></el-table-column>
                        <el-table-column :label="t.colReason" min-width="220" show-overflow-tooltip><template #default="{ row }"><span>{{ row.reason || t.failureNone }}</span></template></el-table-column>
                        <el-table-column :label="t.createdAt" min-width="180"><template #default="{ row }">{{ formatTimestamp(row.createdAt) }}</template></el-table-column>
                        <el-table-column :label="t.colAction" fixed="right" width="140"><template #default="{ row }"><div class="flex items-center gap-2"><el-button link type="primary" @click="handlePushCommand('retry', row)">{{ t.retry }}</el-button><el-button link @click="handlePushCommand('delete', row)">{{ t.delete }}</el-button></div></template></el-table-column>
                      </el-table>
                    </template>

                    <div v-else class="py-8">
                      <el-empty :description="activeTab === 'my' && !activeProject ? t.projectEmptySearch : (currentRows.length ? t.emptyNoResult : (activeTab === 'my' ? t.projectEmptyTitle : t.emptyNoData))"></el-empty>
                      <p v-if="activeTab === 'my' && activeProject && !currentRows.length" class="m-0 text-center text-[12px] text-[#667085]">{{ t.projectEmptyHint }}</p>
                    </div>

                    <div class="smf-pager" v-if="filteredRows.length"><el-pagination :current-page="query.pageIndex" :page-size="query.pageSize" :page-sizes="[10, 20, 30, 50, 100]" :total="filteredRows.length" layout="total, sizes, prev, pager, next, jumper" background @size-change="handlePageSizeChange" @current-change="handlePageChange"></el-pagination></div>
                  </section>
                </main>
              </div>

              <el-drawer v-model="detailDrawer.visible" class="smf-detail-drawer" :size="'1000px'" :title="detailDrawer.mode === 'my' ? t.detailTitleMy : t.detailTitlePublic" destroy-on-close>
                <template #header><div class="smf-drawer-header"><div><h2 class="smf-drawer-title">{{ detailDrawer.record ? detailDrawer.record.name : '-' }}</h2><div v-if="detailDrawer.mode === 'my' ? t.detailDescMy : t.detailDescPublic" class="smf-drawer-sub">{{ detailDrawer.mode === 'my' ? t.detailDescMy : t.detailDescPublic }}</div></div><el-tag round effect="plain">{{ detailDrawer.mode === 'my' ? t.tabMy : t.tabPublic }}</el-tag></div></template>
                <template v-if="detailDrawer.record">
                  <div class="smf-overview-grid">
                    <div class="smf-overview-card"><div class="smf-overview-label">{{ t.latestVersionLabel }}</div><div class="smf-overview-value">{{ detailDrawer.record.latestVersion || detailDrawer.record.versions[0]?.version || '-' }}</div></div>
                    <div class="smf-overview-card"><div class="smf-overview-label">{{ t.sceneTags }}</div><div class="smf-overview-value">{{ (detailDrawer.record.tags || []).join(', ') || '-' }}</div></div>
                    <div class="smf-overview-card"><div class="smf-overview-label">{{ t.versionCount }}</div><div class="smf-overview-value">{{ detailVersions.length }}</div></div>
                    <div class="smf-overview-card"><div class="smf-overview-label">{{ detailDrawer.mode === 'public' ? t.regionCoverage : t.updatedAt }}</div><div class="smf-overview-value">{{ detailDrawer.mode === 'public' ? detailDrawer.record.regions.join(', ') : detailDrawer.record.updatedAt }}</div></div>
                  </div>
                  <section class="smf-section">
                    <div class="smf-table-head"><div><div class="smf-table-title">{{ t.versionList }}</div><div class="smf-table-note">{{ detailDrawer.record.description }}</div></div></div>
                    <el-table :data="detailVersions" class="smf-table" row-key="id" height="420">
                      <el-table-column prop="version" :label="t.colLatestVersion" min-width="140"></el-table-column>
                      <el-table-column v-if="detailDrawer.mode === 'public'" prop="system" :label="t.system" min-width="110"></el-table-column>
                      <el-table-column prop="architecture" :label="t.colArch" min-width="110"></el-table-column>
                      <el-table-column v-if="detailDrawer.mode === 'public'" prop="region" :label="t.colRegion" min-width="120"></el-table-column>
                      <el-table-column prop="size" :label="t.colSize" min-width="110"></el-table-column>
                      <el-table-column :label="t.digest" min-width="220" show-overflow-tooltip><template #default="{ row }"><span>{{ row.digest || '-' }}</span></template></el-table-column>
                      <el-table-column prop="savedAt" :label="t.saveTime" min-width="170"></el-table-column>
                      <el-table-column v-if="detailDrawer.mode === 'my'" :label="t.colAction" fixed="right" width="180"><template #default="{ row }"><div class="flex items-center gap-2"><el-button link type="primary" @click="openCopyDialog(detailDrawer.record, row)">{{ t.copyVersion }}</el-button><el-button link @click="confirmDeleteVersion(row)">{{ t.delete }}</el-button></div></template></el-table-column>
                    </el-table>
                  </section>
                </template>
              </el-drawer>

              <el-dialog v-model="projectDialog.visible" :title="t.createProjectTitle" width="560px">
                <el-form label-position="top">
                  <el-form-item :label="t.projectName" required><el-input v-model="projectDialog.form.name"></el-input><div class="smf-form-help">{{ t.projectNameRule }}</div></el-form-item>
                  <el-form-item :label="t.projectDescription"><el-input v-model="projectDialog.form.description" type="textarea" :rows="3" :placeholder="t.projectDescriptionPlaceholder"></el-input></el-form-item>
                </el-form>
                
                <template #footer><el-button @click="projectDialog.visible = false">{{ t.cancel }}</el-button><el-button type="primary" @click="handleCreateProject">{{ t.create }}</el-button></template>
              </el-dialog>

              <el-dialog v-model="uploadDialog.visible" :title="t.uploadGuideTitle" width="760px">
                <div class="smf-dialog-note">{{ t.uploadGuideLead }}</div>
                <div class="smf-form-help"><strong>{{ t.precondition }}：</strong>{{ lang === 'zh' ? '准备一台已安装 Docker 20.10+ 的主机，并确保能访问目标镜像仓库。' : 'Prepare a Docker 20.10+ host with network access to the target registry.' }}</div>
                <div class="smf-code-block">{{ t.stepLogin }}
{{ uploadCommands.login }}

{{ t.stepTag }}
{{ uploadCommands.tag }}

{{ t.stepPush }}
{{ uploadCommands.push }}</div>
                <template #footer><el-button type="primary" @click="uploadDialog.visible = false">{{ t.confirm }}</el-button></template>
              </el-dialog>

              <el-dialog v-model="tagDialog.visible" :title="t.editTagTitle" width="560px">
                <el-select v-model="tagDialog.tagValues" multiple style="width: 100%;" collapse-tags><el-option v-for="tag in tagCatalog" :key="tag" :label="tag" :value="tag"></el-option></el-select>
                <div class="smf-form-help">{{ lang === 'zh' ? '标签只承担场景识别作用，不在行内重复展示项目信息。' : 'Tags stay focused on scenario fit instead of repeating project context in the table.' }}</div>
                <template #footer><el-button @click="tagDialog.visible = false">{{ t.cancel }}</el-button><el-button type="primary" @click="saveTags">{{ t.save }}</el-button></template>
              </el-dialog>

              <el-dialog v-model="copyDialog.visible" :title="t.copyTitle" width="620px">
                <el-form label-position="top">
                  <el-form-item :label="t.currentProject"><el-input :model-value="copyDialog.sourceProject" disabled></el-input></el-form-item>
                  <el-form-item :label="t.currentRepo"><el-input :model-value="copyDialog.sourceImage + ':' + copyDialog.sourceVersion" disabled></el-input></el-form-item>
                  <el-form-item :label="t.targetProject"><el-select v-model="copyDialog.targetProject" style="width: 100%;"><el-option v-for="project in myProjects" :key="project.id" :label="project.name" :value="project.name"></el-option></el-select></el-form-item>
                  <el-form-item :label="t.targetRepo"><el-input v-model="copyDialog.targetRepo"></el-input></el-form-item>
                </el-form>
                <template #footer><el-button @click="copyDialog.visible = false">{{ t.cancel }}</el-button><el-button type="primary" @click="submitCopy">{{ t.confirm }}</el-button></template>
              </el-dialog>
            </div>
          `
        };
        const app = createApp(App);
        Object.entries(ElementPlusIconsVue).forEach(([name, component]) => { app.component(name, component); });
        app.use(ElementPlus);
        app.mount("#app");
      })();
    </script>
  </body>
</html>
