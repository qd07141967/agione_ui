<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGIOne 资源配额总览原型 V5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" />
    <style>
      :root {
        --smf-primary: #4c5df7;
        --smf-page-bg: #f5f7fb;
        --smf-surface: rgba(255, 255, 255, 0.94);
        --smf-border: #e5e7eb;
        --smf-border-soft: #eef1f5;
        --smf-text: #111827;
        --smf-text-2: #475569;
        --smf-text-3: #94a3b8;
        --smf-shadow-s1: 0 1px 2px rgba(15, 23, 42, 0.05);
        --smf-shadow-s3: 0 18px 40px rgba(76, 93, 247, 0.12);
        --z-topbar: 1000;
        --z-side: 100;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 1280px;
        font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--smf-text);
        background:
          radial-gradient(circle at top left, rgba(76, 93, 247, 0.1), transparent 20%),
          radial-gradient(circle at 95% 0%, rgba(56, 189, 248, 0.08), transparent 18%),
          linear-gradient(180deg, #f8f9fd 0%, #f4f6fb 100%);
      }

      [v-cloak] { display: none; }

      button:focus-visible,
      [role="button"]:focus-visible,
      a:focus-visible,
      .el-input__wrapper:focus-within,
      .el-select__wrapper:focus-within {
        outline: 2px solid var(--smf-primary);
        outline-offset: 3px;
      }

      .smf-shell-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #ebeef5;
        z-index: var(--z-topbar);
      }

      .smf-logo-block {
        height: 52px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .smf-logo-mark {
        position: relative;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        overflow: hidden;
        background: linear-gradient(140deg, #25338b 8%, #4c5df7 50%, #9da8ff 100%);
      }

      .smf-logo-mark::before {
        content: "";
        position: absolute;
        inset: 4px 7px 4px 7px;
        border-radius: 6px 16px 10px 6px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.62));
        transform: skewX(-12deg);
      }

      .smf-logo-text { font-size: 16px; font-weight: 700; color: #303133; }

      .smf-top-nav {
        height: 52px;
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 0 8px;
      }

      .smf-top-nav-btn {
        position: relative;
        height: 52px;
        border: 0;
        padding: 0;
        background: transparent;
        color: #606266;
        font-size: 14px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
      }

      .smf-top-nav-btn.active { color: #303133; font-weight: 600; }
      .smf-top-nav-btn.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        border-radius: 999px;
        background: var(--smf-primary);
      }

      .smf-header-right {
        margin-left: auto;
        height: 52px;
        display: flex;
        align-items: center;
        padding-right: 20px;
        gap: 20px;
      }

      .smf-head-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #303133;
        white-space: nowrap;
        cursor: pointer;
      }

      .smf-avatar {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
        color: #3555f5;
        background: linear-gradient(180deg, #e5ecff 0%, #dbe4ff 100%);
      }

      .smf-shell-body {
        display: flex;
        height: calc(100vh - 52px);
        margin-top: 52px;
      }

      .smf-shell-side {
        width: 200px;
        flex-shrink: 0;
        overflow-y: auto;
        padding: 12px 0;
        background: rgba(255, 255, 255, 0.95);
        border-right: 1px solid #ebeef5;
        z-index: var(--z-side);
      }

      .smf-side-group { margin-bottom: 8px; }
      .smf-side-title {
        margin: 0;
        padding: 12px 0 8px 20px;
        font-size: 12px;
        font-weight: 700;
        color: #909399;
      }

      .smf-side-item {
        position: relative;
        width: 100%;
        height: 40px;
        padding: 0 16px 0 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        border: 0;
        background: transparent;
        color: #303133;
        font-size: 14px;
        cursor: pointer;
        text-align: left;
      }

      .smf-side-item.active {
        background: #eef0ff;
        color: var(--smf-primary);
        font-weight: 600;
      }

      .smf-side-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: var(--smf-primary);
      }

      .smf-shell-main {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 20px 28px 28px;
      }

      .smf-card-shell {
        border: 1px solid rgba(229, 231, 235, 0.92);
        border-radius: 20px;
        background: var(--smf-surface);
        box-shadow: var(--smf-shadow-s1);
      }

      .smf-header-box {
        padding: 22px 24px 20px;
        background:
          radial-gradient(circle at right top, rgba(76, 93, 247, 0.1), transparent 24%),
          linear-gradient(145deg, #ffffff 0%, #f8faff 100%);
      }

      .smf-breadcrumb {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #98a2b3;
        text-transform: uppercase;
      }

      .smf-title-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .smf-title-row h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        font-weight: 800;
        color: #111827;
      }

      .smf-version-pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #4c5df7;
        font-size: 11px;
        font-weight: 700;
      }

      .smf-header-desc {
        margin-top: 10px;
        max-width: 860px;
        font-size: 13px;
        line-height: 1.7;
        color: #5b6475;
      }

      .smf-header-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        white-space: nowrap;
      }

      .smf-overview-grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1.52fr 1.08fr;
        gap: 14px;
      }

      .smf-gpu-panel,
      .smf-cm-card,
      .smf-scene-card {
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
        border: 1px solid rgba(229, 231, 235, 0.92);
        box-shadow: var(--smf-shadow-s1);
      }

      .smf-gpu-panel {
        padding: 18px;
        padding-bottom: 12px;
        border-radius: 18px;
      }

      .smf-panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .smf-panel-head h3,
      .smf-cm-card h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        color: #111827;
      }

      .smf-panel-head p,
      .smf-content-title p,
      .smf-scene-card p,
      .smf-cm-note {
        margin: 6px 0 0;
        font-size: 12px;
        line-height: 1.6;
        color: #64748b;
      }

      .smf-gpu-total { display: flex; align-items: center; }

      .smf-total-card {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 248px;
        padding: 12px 14px;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(76, 93, 247, 0.1), rgba(255, 255, 255, 0.98));
        border: 1px solid rgba(76, 93, 247, 0.16);
      }

      .smf-total-card-mark {
        width: 12px;
        height: 44px;
        border-radius: 999px;
        background: linear-gradient(180deg, #4c5df7 0%, #7c8cff 100%);
        box-shadow: 0 8px 20px rgba(76, 93, 247, 0.18);
        flex-shrink: 0;
      }

      .smf-total-card-value {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
      }

      .smf-total-card-value em {
        font-style: normal;
        font-size: 13px;
        font-weight: 700;
        color: #475569;
      }

      .smf-total-card-copy strong {
        display: block;
        font-size: 28px;
        font-weight: 800;
        line-height: 1;
        color: #1f33c7;
      }

      .smf-total-card-copy span {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: #5b6475;
      }

      .smf-gpu-model-grid {
        margin-top: 14px;
        border: 1px solid rgba(229, 231, 235, 0.96);
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
      }

      .smf-gpu-model-head,
      .smf-gpu-model-row {
        display: grid;
        grid-template-columns: minmax(220px, 1.65fr) minmax(100px, 0.7fr) minmax(100px, 0.7fr) minmax(100px, 0.7fr) minmax(130px, 0.86fr);
        align-items: center;
        column-gap: 12px;
        padding: 12px 16px;
      }

      .smf-gpu-model-head {
        background: #f8fafc;
        border-bottom: 1px solid var(--smf-border);
        font-size: 12px;
        font-weight: 700;
        color: #64748b;
      }

      .smf-status-head {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .smf-sort-toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
      }

      .smf-sort-toggle.active {
        color: #4c5df7;
      }

      .smf-status-tip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #eef2ff;
        color: #4c5df7;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }

      .smf-gpu-model-body {
        max-height: 344px;
        overflow-y: auto;
      }

      .smf-gpu-model-row {
        border-bottom: 1px solid #f1f5f9;
        transition: background 160ms ease;
      }

      .smf-gpu-model-row:last-child { border-bottom: 0; }
      .smf-gpu-model-row:hover { background: #f8faff; }

      .smf-gpu-model-name strong {
        display: block;
        font-size: 14px;
        font-weight: 800;
        color: #111827;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .smf-gpu-model-name span {
        display: block;
        margin-top: 4px;
        font-size: 11px;
        color: var(--smf-text-3);
      }

      .smf-gpu-value {
        font-size: 15px;
        font-weight: 700;
        color: #111827;
      }

      .smf-status-pill {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .smf-status-pill.normal { background: #ecfdf3; color: #067647; }
      .smf-status-pill.warn { background: #fff7ed; color: #c2410c; }
      .smf-status-pill.high { background: #fef2f2; color: #b42318; }
      .smf-status-pill.unlimited { background: #eef2ff; color: #4c5df7; }

      .smf-cm-panel {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 10px;
        align-content: start;
      }

      .smf-cm-card {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding: 12px;
        border-radius: 18px;
      }

      .smf-cm-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .smf-cm-kpi {
        text-align: right;
        min-width: 64px;
      }

      .smf-cm-kpi strong {
        display: block;
        font-size: 21px;
        line-height: 1;
        color: #111827;
      }

      .smf-cm-kpi span {
        display: block;
        margin-top: 3px;
        font-size: 11px;
        color: #64748b;
      }

      .smf-cm-progress { margin-top: 6px; }

      .smf-cm-progress-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 11px;
        color: #64748b;
      }

      .smf-cm-progress-track {
        margin-top: 5px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #e8edf8;
      }

      .smf-cm-progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #4c5df7 0%, #6ca6ff 100%);
      }

      .smf-cm-data,
      .smf-scene-metrics,
      .smf-drawer-kpis {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }

      .smf-cm-data { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .smf-scene-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .smf-drawer-kpis { grid-template-columns: repeat(5, minmax(0, 1fr)); }

      .smf-metric-box,
      .smf-scene-mini {
        border-radius: 14px;
        padding: 10px;
        background: #ffffff;
        border: 1px solid var(--smf-border);
      }

      .smf-metric-box label,
      .smf-scene-mini label {
        display: block;
        font-size: 12px;
        line-height: 1.15;
        color: #64748b;
      }

      .smf-metric-box strong,
      .smf-scene-mini strong {
        display: block;
        margin-top: 3px;
        font-size: 18px;
        line-height: 1.05;
        color: #111827;
      }

      .smf-value-unit {
        margin-top: 1px;
        font-size: 12px;
        color: #64748b;
      }

      .smf-cm-note {
        margin-top: 2px;
        line-height: 1.4;
      }

      .smf-content-box {
        margin-top: 16px;
        padding: 16px 18px 18px;
      }

      .smf-content-head {
        margin-bottom: 10px;
      }

      .smf-content-title strong {
        font-size: 15px;
        color: #111827;
      }

      .smf-card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .smf-scene-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
        padding: 14px;
        border-radius: 18px;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .smf-scene-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--smf-shadow-s3);
      }

      .smf-scene-card h4 {
        margin: 0;
        font-size: 17px;
        font-weight: 800;
        color: #111827;
      }

      .smf-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .smf-meta-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid rgba(229, 231, 235, 0.92);
        color: #475569;
        font-size: 12px;
        font-weight: 600;
      }

      .smf-scene-bottom {
        margin-top: 4px;
        display: flex;
        justify-content: flex-end;
      }

      .smf-drawer-shell {
        height: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .smf-drawer-top {
        flex: 0 0 auto;
      }

      .smf-drawer-bottom {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .smf-drawer-table-wrap {
        flex: 1 1 auto;
        min-height: 0;
      }

      .smf-drawer-pagination {
        flex: 0 0 auto;
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }

      .smf-drawer-section {
        border: 1px solid var(--smf-border-soft);
        border-radius: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #fafbff 100%);
        padding: 10px 12px;
        margin-bottom: 10px;
      }

      .smf-drawer-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .smf-drawer-title strong {
        font-size: 14px;
        color: #111827;
      }

      .smf-drawer-title span {
        font-size: 12px;
        color: #64748b;
      }

      .smf-filter-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .smf-drawer-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .smf-drawer-title strong {
        font-size: 14px;
        color: #111827;
      }

      .smf-drawer-title span {
        font-size: 12px;
        color: #64748b;
      }

      .smf-filter-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .smf-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      .smf-status .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
      }

      .smf-status.running { color: #67c23a; }
      .smf-status.starting { color: #4c5df7; }

      @media (max-width: 1440px) {
        .smf-overview-grid { grid-template-columns: 1.35fr 1fr; }
        .smf-card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media (max-width: 1280px) {
        body { min-width: 0; }
        .smf-shell-side { display: none; }
        .smf-shell-main { padding: 16px; }
        .smf-overview-grid { grid-template-columns: 1fr; }
        .smf-drawer-kpis,
        .smf-scene-metrics,
        .smf-card-grid,
        .smf-cm-data { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
    <script>
      (function () {
        if (!window.Vue || !window.ElementPlus || !window.ElementPlusIconsVue) {
          document.body.innerHTML = '<div style="padding:24px;font-family:Inter,sans-serif;color:#b42318;">CDN dependencies failed to load. Please refresh and try again.</div>';
          return;
        }

        const { createApp, ref, reactive, computed, watch, onMounted } = Vue;
        const { Document, Globe, Location, Grid, Histogram, Search, Cpu, Monitor } = ElementPlusIconsVue;

        const App = {
          setup() {
            const lang = ref("zh");
            const topActive = ref("infra");
            const sideActive = ref("quota");
            const region = ref("wuhan");
            const version = ref("V5.0");
            const loading = ref(true);
            const detailVisible = ref(false);
            const detailSceneKey = ref("inference");
            const gpuSort = reactive({ field: "used", order: "desc" });

            const dict = {
              zh: {
                docsCenter: "文档中心",
                topAi: "模型及AI服务",
                topInfra: "AI基础设施",
                topAccount: "账务",
                topSpace: "用户空间",
                groupInfra: "基础设施",
                groupUsage: "资源治理",
                menuQuota: "资源配额",
                menuUsage: "资源用量",
                menuSpecs: "资源规格",
                menuMonitor: "监控中心",
                breadcrumb: "AI Infrastructure",
                pageTitle: "资源配额总览",
                pageDesc: "查看当前租户的 XPU、CPU、内存总量、已使用量和未使用量。",
                refresh: "刷新",
                export: "导出占用视图",
                gpuPool: "XPU 资源总览",
                gpuSub: "按型号查看当前租户可使用的 XPU 资源情况。",
                gpuTotalUsed: "XPU 已使用总量",
                total: "总量",
                idle: "未使用",
                used: "已使用",
                status: "状态",
                statusRule: "状态说明：已使用 / 总量 ≥ 90% 为紧张，70% ~ 90% 为较高，低于 70% 为正常；总量不限时显示不限。",
                statusNormal: "正常",
                statusWarn: "较高",
                statusHigh: "紧张",
                statusUnlimited: "不限",
                gpuOtherHint: "未单独配置上限的 GPU 统一归入该类。",
                cpu: "CPU",

                          <label>{{ t.drawerMemory }}</label>
                          <strong>{{ currentDetailScene.memoryValue }}<span style="margin-left:4px;font-size:12px;font-weight:500;color:#64748b;">{{ currentDetailScene.memoryUnit }}</span></strong>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="smf-drawer-bottom">
                    <div class="smf-drawer-section" style="margin-bottom:0;display:flex;flex-direction:column;min-height:0;flex:1;">
                      <div class="smf-drawer-title">
                        <strong>{{ t.drawerList }}</strong>
                      </div>
                      <div class="smf-filter-row">
                        <el-input v-model="detailFilters.keyword" :placeholder="t.drawerSearchPlaceholder" clearable style="width: 360px;">
                          <template #prefix><el-icon><Search /></el-icon></template>
                        </el-input>
                        <el-select v-model="detailFilters.status" style="width: 180px;">
                          <el-option :label="t.filterAll" value="all"></el-option>
                          <el-option :label="t.running" value="running"></el-option>
                          <el-option :label="t.starting" value="starting"></el-option>
                        </el-select>
                      </div>
                      <div class="smf-drawer-table-wrap">
                        <el-table :data="pagedDetailRows" height="100%" stripe border>
                          <el-table-column prop="name" :label="t.drawerSearch" min-width="280" show-overflow-tooltip></el-table-column>
                          <el-table-column :label="t.drawerStatus" min-width="120">
                            <template #default="{ row }">
                              <span class="smf-status" :class="row.statusKey">
                                <i class="dot"></i>
                                {{ row.status }}
                              </span>
                            </template>
                          </el-table-column>
                          <el-table-column prop="gpu" :label="t.drawerGpu" min-width="140"></el-table-column>
                          <el-table-column prop="cpu" :label="t.drawerCpu" min-width="120"></el-table-column>
                          <el-table-column prop="memory" :label="t.drawerMemory" min-width="120"></el-table-column>
                        </el-table>
                      </div>
                      <div class="smf-drawer-pagination">
                        <el-pagination v-model:current-page="detailPage" :page-size="detailPageSize" :total="detailRows.length" layout="prev, pager, next" background></el-pagination>
                      </div>
                    </div>
                  </div>
                </div>
              </el-drawer>
            </div>
          `
        };

        const app = createApp(App);
        Object.keys(window.ElementPlusIconsVue).forEach((key) => {
          app.component(key, window.ElementPlusIconsVue[key]);
        });
        app.use(window.ElementPlus);
        app.mount("#app");
      })();
    </script>
  </body>
</html>
